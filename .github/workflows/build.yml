name: Build and Release APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      
    - name: Accept Android SDK licenses
      run: |
        yes | sdkmanager --licenses || true
        sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
      
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
        
    - name: Validate Gradle wrapper
      uses: gradle/actions/wrapper-validation@v4
        
    - name: Build Debug APK with all dependencies
      run: |
        echo "Building AndroidDevSuite..."
        ./gradlew clean
        ./gradlew assembleDebug --stacktrace --info
        ls -la app/build/outputs/apk/debug/ || echo "APK output not found"
        
    - name: Check APK size
      run: |
        APK_PATH="app/build/outputs/apk/debug/app-debug.apk"
        if [ -f "$APK_PATH" ]; then
          SIZE=$(stat -c%s "$APK_PATH")
          echo "APK Size: $SIZE bytes ($(echo "scale=2; $SIZE/1024/1024" | bc) MB)"
          if [ $SIZE -lt 1000000 ]; then
            echo "WARNING: APK size is less than 1MB, there might be an issue"
          fi
        else
          echo "APK not found at $APK_PATH"
          find app/build -name "*.apk" 2>/dev/null || echo "No APK files found"
        fi
      
    - name: Run Unit Tests
      run: ./gradlew test || true
      continue-on-error: true
      
    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk
        retention-days: 30
        if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download APK artifact
      uses: actions/download-artifact@v4
      with:
        name: app-debug
        path: apk/
      
    - name: Get version info
      id: version
      run: |
        VERSION=$(grep "versionName" app/build.gradle.kts | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "2.0.0")
        VERSION_CODE=$(grep "versionCode" app/build.gradle.kts | head -1 | sed 's/[^0-9]//g' || echo "2")
        BUILD_DATE=$(date +'%Y%m%d')
        echo "version=${VERSION}" >> $GITHUB_OUTPUT
        echo "version_code=${VERSION_CODE}" >> $GITHUB_OUTPUT
        echo "build_date=${BUILD_DATE}" >> $GITHUB_OUTPUT
        
    - name: List APK files
      run: |
        echo "APK files:"
        ls -la apk/
        echo "File sizes:"
        du -h apk/*
        
    - name: Create Release with APK
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: 🚀 Android Development Suite v${{ steps.version.outputs.version }}
        body: |
          # 🚀 Android Development Suite
          
          ## 📱 التحميل
          قم بتحميل ملف APK من قسم Assets أدناه.
          
          ## ✨ الميزات
          - 🎨 Visual UI Editor
          - 🧩 Block-based Programming (Sketchware-like)
          - 💻 Advanced Code Editor with syntax highlighting
          - 📦 APK Editor (MT Manager-like)
          - 🖥️ Terminal Emulator (Termux-like)
          - 🤖 **Ollama AI Assistant** - Local LLM support
          - 🔄 Git Integration
          - 📁 File Manager
          - 🏗️ Project Templates
          
          ## 🛠️ التقنيات المستخدمة
          | التقنية | الإصدار |
          |---------|---------|
          | Kotlin | 2.0.21 |
          | Jetpack Compose | Latest |
          | Material Design | 3 |
          | Hilt DI | 2.52 |
          | Room Database | 2.6.1 |
          | Ollama API | Local LLM |
          
          ## 📱 المتطلبات
          - **Min SDK:** Android 8.0 (API 26)
          - **Target SDK:** Android 15 (API 35)
          
          ## 🤖 إعداد Ollama
          1. قم بتثبيت Ollama: `curl -fsSL https://ollama.com/install.sh | sh`
          2. شغّل الخادم: `ollama serve`
          3. حمّل نموذج: `ollama pull codellama:7b`
          
          ---
          
          **Build Date:** ${{ steps.version.outputs.build_date }}
          **Commit:** `${{ github.sha }}`
          
        files: apk/*.apk
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
